# A joining SV's scan bootstraps its migration id from the scan of the SV sponsoring the onboarding.
# Set this to the URL of that sponsor scan (matching the SV's sponsorApiUrl in sv-values.yaml).
sponsorScanUrl: "https://scan.sv-2.TARGET_HOSTNAME"

participantAddress: "participant"
synchronizers:
  current:
    # Enable when using CantonBFT
    # cantonBft:
    #   p2pUrl: https://sequencer-p2p-SERIAL_ID.sv.YOUR_HOSTNAME
    sequencer: "global-domain-SERIAL_ID-sequencer"
    mediator: "global-domain-SERIAL_ID-mediator"

persistence:
  host: apps-pg
  secretName: apps-pg-secret

spliceInstanceNames:
  networkName: # Please provide a value as provided in the docs
  networkFaviconUrl: # Please provide a value as provided in the docs
  amuletName: # Please provide a value as provided in the docs
  amuletNameAcronym: # Please provide a value as provided in the docs
  nameServiceName: # Please provide a value as provided in the docs
  nameServiceNameAcronym: # Please provide a value as provided in the docs
