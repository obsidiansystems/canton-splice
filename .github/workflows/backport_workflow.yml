name: Backport a commit or PR across branches
on:
  workflow_call:
    inputs:
      commit_sha:
        description: 'A commit SHA to backport (either commit_sha or pr_number must be provided)'
        required: false
        type: string
      pr_number:
        description: 'A merged PR to backport (either commit_sha or pr_number must be provided)'
        required: false
        type: number
      base_branch:
        description: 'The branch to backport to'
        required: true
        type: string
      reviewer:
        description: 'The GitHub username of a reviewer to request a review from (currently supports only one reviewer)'
        required: false
        type: string
    secrets:
      strong_token:
        description: 'The GitHub token with permissions to create PRs.'
        required: true

jobs:
  get_commit_sha:
    runs-on: ubuntu-24.04
    outputs:
      result: ${{ steps.get_commit_sha.outputs.result }}
    steps:
      - name: Check Inputs
        run: |
          if [ -z "${{ inputs.commit_sha }}" ] && [ -z "${{ inputs.pr_number }}" ]; then
            echo "Either commit_sha or pr_number must be provided"
            exit 1
          fi
          if [ -n "${{ inputs.commit_sha }}" ] && [ -n "${{ inputs.pr_number }}" ]; then
            echo "Only one of commit_sha or pr_number can be provided"
            exit 1
          fi
      - name: Get Commit Sha
        id: get_commit_sha
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          commit_sha: ${{ inputs.commit_sha }}
          pr_number: ${{ inputs.pr_number }}
        with:
          retries: 3
          script: |
            const { commit_sha, pr_number } = process.env;
            if (commit_sha) {
              return commit_sha;
            }
            return await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            }).then(pull => {
              return pull.data.merge_commit_sha;
            });

  do_backport:
    runs-on: ubuntu-latest
    needs: get_commit_sha
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base_branch }}
          submodules: 'true'
          token: ${{ secrets.strong_token }}
      - name: Backport to ${{ inputs.base_branch }} - Create branch, update expected files & push
        id: create_branch
        shell: bash
        timeout-minutes: 20
        run: |
          commit_sha="${{ needs.get_commit_sha.outputs.result }}"
          base_branch="${{ inputs.base_branch }}"
          new_branch="automation/backport-$commit_sha-$base_branch"
          echo "Backporting commit $commit_sha to branch $base_branch (using branch $new_branch)"
          git fetch origin $base_branch
          git fetch origin --recurse-submodules=no $commit_sha
          git config user.email "splice-maintainers@digitalasset.com"
          git config user.name "DA Automation"
          git checkout -b $new_branch origin/$base_branch
          # Filter files for the patch
          EXPECTED_FILE_REGEX="cluster/expected/.*/expected.*\.json"
          RESOLVED_CONFIG_FILE_REGEX="cluster/deployment/.*/config\.resolved\.yaml"
          git cherry-pick --no-commit "$commit_sha" || true
          conflicted_files=$(git diff --name-only --diff-filter=U)
          if [ -n "$conflicted_files" ]; then
            echo "$conflicted_files" | while IFS= read -r file; do
              echo "Resetting conflicting file $file"
              git reset "$file"
            done
          fi
          git commit --author="$(git show -s --format='%an <%ae>' $commit_sha)" \
            --date="$(git show -s --format='%ad' $commit_sha)" \
            -m "$(git show -s --format='%B' $commit_sha)"
          if echo "$conflicted_files" | grep -v -E "$EXPECTED_FILE_REGEX|$RESOLVED_CONFIG_FILE_REGEX" | grep -q .; then
            echo "Detected conflicts outside of expected files and resolved config files. Automated backport cannot proceed."
            exit 1
          else
            echo "Regenerating expected files"
            if [ -d splice ]; then
              cd splice
              source .envrc.vars
              cd ..
            fi
            source .envrc.vars
            git status
            # TODO(#4366) Remove the npm install steps when the makefile dependencies work properly
            cd cluster/pulumi
            echo "Running npm ci in $(pwd)"
            npm ci
            cd ../..
            if [ -d splice ]; then
              cd splice/cluster/pulumi
              echo "Running npm ci in $(pwd)"
              npm ci
              cd ../../..
            fi
            make update-expected -j4
            if git status --porcelain | grep -q -E "$EXPECTED_FILE_REGEX|$RESOLVED_CONFIG_FILE_REGEX"; then
              git add cluster/expected/*/expected*.json
              # do not add scratchnet's symlinks
              if [ -d splice ]; then
                # shellcheck disable=SC2010
                ls cluster/deployment/*/config.resolved.yaml | grep -v "scratchnet" | xargs -r git add
              else
                git add cluster/deployment/*/config.resolved.yaml
              fi
              git commit -m "update expected" -s
            fi
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "WARNING: There are uncommitted changes"
            git status
            git diff
            exit 1
          fi
          git commit -m "[static]" -s --allow-empty
          git push origin $new_branch
          # output the backport branch name and update-expected result for use
          # in the next step
          echo "update_expected=$UPDATED_EXPECTED" >> "$GITHUB_OUTPUT"
          echo "new_branch=$new_branch" >> "$GITHUB_OUTPUT"
      - name: Backport to ${{ inputs.base_branch }} - Create PR
        id: create_pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          new_branch: ${{ steps.create_branch.outputs.new_branch }}
          base_branch: ${{ inputs.base_branch }}
          input_commit_sha: ${{ inputs.commit_sha }}
          pr_number: ${{ inputs.pr_number }}
          update_expected: ${{ steps.create_branch.outputs.update_expected }}
        with:
          # Switch the GH token from the default repo token to the one for
          # canton-network-da. This ensures this is treated as a regular pull request
          # that can trigger CI.
          github-token: ${{ secrets.strong_token }}
          retries: 3
          script: |
            const { new_branch, base_branch, input_commit_sha, pr_number, update_expected } = process.env;
            const backport_what = input_commit_sha ? `commit ${input_commit_sha}` : `PR #${pr_number}`;
            const title = `Backport ${backport_what} to ${base_branch}`;
            let body = `This PR was automatically created to backport ${backport_what} to ${base_branch}.`;
            if (update_expected === 'true') {
              body += '\n\n:warning: `make update-expected` was run automatically and produced changes, which may diverge from the original PR. Please re-review them.';
            }
            return await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              head: new_branch,
              base: base_branch,
              body: body
            }).then(pull => {
              return pull.data.number;
            });
      - name: Request review
        if: ${{ inputs.reviewer }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          reviewer: ${{ inputs.reviewer }}
          pr_number: ${{ steps.create_pr.outputs.result }}
        with:
          # Use the same token as the PR-creation step so the review request is
          # made by the PR's author (canton-network-da)
          github-token: ${{ secrets.strong_token }}
          retries: 3
          script: |
            const { reviewer } = process.env;
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: process.env.pr_number,
              reviewers: [process.env.reviewer]
            });
  notify_on_failure:
    runs-on: ubuntu-24.04
    needs: do_backport
    # If a PR was given for backporting from, notify on failure as a comment on that PR
    if: ${{ failure() && inputs.pr_number }}
    steps:
      - name: Notify on failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          pr_number: ${{ inputs.pr_number }}
          base_branch: ${{ inputs.base_branch }}
        with:
          retries: 3
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.pr_number,
              body: `Backport to branch ${process.env.base_branch} failed. Please check the logs for more information.`,
            });
