name: Daily store performance tests
on:
  # allow manual running on PRs that you expect might affect store performance
  workflow_dispatch:
  schedule:
    - cron: '37 3 * * 1-5' # 3:37 AM on workdays

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-perftest
  cancel-in-progress: true

permissions:
  id-token: write # Required to create a GitHub OIDC token for GCP Workload Identity Federation (used by GCS download and failure notifications)
  contents: read

jobs:
  ingestion_performance_tests:
    # note that we're loading the entirety of mainnet updates (and in the future, the ACS) so as to make sure that that's not the bottleneck.
    # as of 03.03.2026 that seems to be enough, but we might have to increase it as the activity in mainnet does too.
    runs-on: self-hosted-k8s-medium
    container:
      image: us-central1-docker.pkg.dev/da-cn-shared/ghcr/digital-asset/decentralized-canton-sync-dev/docker/splice-test-ci:0.3.12
    name: Ingestion Performance Tests
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ''
          submodules: "recursive"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        id: setup
        uses: ./splice-shared-gha/.github/actions/tests/common_test_setup
        with:
          cache_version: 8
          test_name: oss
          target: 'oss'

      # Authenticate to GCP for read access to GCS
      - name: Authenticate to GCP (mainnet-history-dumps)
        id: gcp_auth
        uses: 'google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193' # v2.1.10
        with:
          workload_identity_provider: '${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.MAINNET_HISTORY_DUMPS_USER_SA }}'
          create_credentials_file: true

      - name: Run ingestion performance tests
        uses: ./splice-shared-gha/.github/actions/sbt/execute_sbt_command
        env:
          PERFORMANCE_TESTS_DB_PASSWORD: ${{ secrets.PERFORMANCE_TESTS_DB_PASSWORD }}
          PERFORMANCE_TESTS_DB_HOST: ${{ secrets.PERFORMANCE_TESTS_DB_HOST }}
          PERFORMANCE_TESTS_DB_USER: ${{ secrets.PERFORMANCE_TESTS_DB_USER }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp_auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.gcp_auth.outputs.credentials_file_path }}
        with:
          additional_nix_args: "--keep PERFORMANCE_TESTS_DB_PASSWORD --keep PERFORMANCE_TESTS_DB_HOST --keep PERFORMANCE_TESTS_DB_USER --keep GOOGLE_APPLICATION_CREDENTIALS --keep CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE"
          extra_env_vars: 'POSTGRES_HOST="$PERFORMANCE_TESTS_DB_HOST" POSTGRES_USER="$PERFORMANCE_TESTS_DB_USER" POSTGRES_PASSWORD="$PERFORMANCE_TESTS_DB_PASSWORD"'
          pre_sbt_cmd: |
            echo "Clearing stale metrics files"
            rm -rf /tmp/store-ingestion-perf-metrics

            echo "Clearing database"
            PGPASSWORD="$PERFORMANCE_TESTS_DB_PASSWORD" psql \
              -h"$PERFORMANCE_TESTS_DB_HOST" \
              -U"$PERFORMANCE_TESTS_DB_USER" \
              -dcantonnet \
              -c 'DROP DATABASE IF EXISTS splice_apps' \
              -c 'CREATE DATABASE splice_apps' || (echo "Connection to DB failed" && exit 1)

            echo "Downloading updates from mainnet for performance tests"
            gcloud storage cp "gs://mainnet-history-dumps/mainnetupdates.json" /tmp/mainnetupdates.json
            ls -lah /tmp/mainnetupdates.json
          cmd: '"apps-app / Test / runMain org.lfdecentralizedtrust.splice.performance.SplicePerf run -t DbSvDsoStore -c ./apps/app/src/test/resources/performance/tests.conf -d /tmp/mainnetupdates.json" "apps-app / Test / runMain org.lfdecentralizedtrust.splice.performance.SplicePerf run -t DbScanStore -c ./apps/app/src/test/resources/performance/tests.conf -d /tmp/mainnetupdates.json" "apps-app / Test / runMain org.lfdecentralizedtrust.splice.performance.SplicePerf run -t UpdateHistory -c ./apps/app/src/test/resources/performance/tests.conf -d /tmp/mainnetupdates.json"'

      - name: Push ingestion metrics to Prometheus Pushgateway
        if: ${{ success() }}
        run: |
          python3 scripts/performance/push_store_ingestion_perf_metrics.py

      - name: Upload ingestion metrics artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: store-ingestion-perf-metrics-${{ github.run_id }}
          path: /tmp/store-ingestion-perf-metrics

      - name: Check ingestion thresholds
        id: perf_check
        if: ${{ success() && github.event_name == 'schedule' }}
        run: |
          python3 scripts/performance/check_perf_thresholds.py /tmp/store-ingestion-perf-metrics

      # sanity check
      - name: Check logs for errors
        uses: ./splice-shared-gha/.github/actions/sbt/execute_sbt_command
        with:
          # we don't care if some integration test happened to make the repo dirty
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1"
          cmd: checkErrors

      - name: Upload logs
        # if they're successful we don't care too much about the logs - but note that the ingestion are still logged
        # as part of the GHA run itself (meaning: we use println to stdout)
        if: ${{ !success() }}
        uses: ./splice-shared-gha/.github/actions/sbt/upload_logs
        with:
          name: "logs-ingestion-performance-tests"

      - name: Report Failures on Slack & Github
        if: ${{ github.event_name == 'schedule' && (failure() || steps.perf_check.outputs.has_breaches == 'true') }}
        uses: ./splice-shared-gha/.github/actions/tests/failure_notifications
        with:
          job_subname: "Ingestion Tests"
          workload_identity_provider: "${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.FAILURE_NOTIFICATIONS_INVOKER_SA }}"
          notifications_url: '${{ secrets.FAILURE_NOTIFICATIONS_INVOKER_URL }}'
          slack_channel: '${{ secrets.FAILURE_NOTIFICATIONS_SLACK_CHANNEL }}'

  read_performance_tests:
    needs: ingestion_performance_tests
    runs-on: self-hosted-k8s-medium
    container:
      image: us-central1-docker.pkg.dev/da-cn-shared/ghcr/digital-asset/decentralized-canton-sync-dev/docker/splice-test-ci:0.3.12
    name: Read Performance Tests
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ''
          submodules: "recursive"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        id: setup
        uses: ./splice-shared-gha/.github/actions/tests/common_test_setup
        with:
          cache_version: 8
          test_name: oss
          target: 'oss'

      # Authenticate to GCP for read access to GCS
      - name: Authenticate to GCP (mainnet-history-dumps)
        id: gcp_auth
        uses: 'google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193' # v2.1.10
        with:
          workload_identity_provider: '${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.MAINNET_HISTORY_DUMPS_USER_SA }}'
          create_credentials_file: true

      - name: Run read performance tests
        uses: ./splice-shared-gha/.github/actions/sbt/execute_sbt_command
        env:
          PERFORMANCE_TESTS_DB_PASSWORD: ${{ secrets.PERFORMANCE_TESTS_DB_PASSWORD }}
          PERFORMANCE_TESTS_DB_HOST: ${{ secrets.PERFORMANCE_TESTS_DB_HOST }}
          PERFORMANCE_TESTS_DB_USER: ${{ secrets.PERFORMANCE_TESTS_DB_USER }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp_auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.gcp_auth.outputs.credentials_file_path }}
        with:
          additional_nix_args: "--keep PERFORMANCE_TESTS_DB_PASSWORD --keep PERFORMANCE_TESTS_DB_HOST --keep PERFORMANCE_TESTS_DB_USER --keep GOOGLE_APPLICATION_CREDENTIALS --keep CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE"
          extra_env_vars: 'POSTGRES_HOST="$PERFORMANCE_TESTS_DB_HOST" POSTGRES_USER="$PERFORMANCE_TESTS_DB_USER" POSTGRES_PASSWORD="$PERFORMANCE_TESTS_DB_PASSWORD"'
          pre_sbt_cmd: |
            echo "Clearing stale metrics files"
            rm -rf /tmp/store-read-perf-metrics

            echo "Clearing database for read tests"
            PGPASSWORD="$PERFORMANCE_TESTS_DB_PASSWORD" psql \
              -h"$PERFORMANCE_TESTS_DB_HOST" \
              -U"$PERFORMANCE_TESTS_DB_USER" \
              -dcantonnet \
              -c 'DROP DATABASE IF EXISTS splice_apps' \
              -c 'CREATE DATABASE splice_apps' || (echo "Connection to DB failed" && exit 1)

            echo "Downloading mainnet updates from storage bucket for read performance tests"
            gcloud storage cp "gs://mainnet-history-dumps/mainnet_big_update.json" /tmp/mainnet_big_update.json
            ls -lah /tmp/mainnet_big_update.json
          cmd: '"apps-app / Test / runMain org.lfdecentralizedtrust.splice.performance.SplicePerf run -t UpdateHistoryRead -c ./apps/app/src/test/resources/performance/tests.conf -d /tmp/mainnet_big_update.json"'

      - name: Push read metrics to Prometheus Pushgateway
        if: ${{ success() }}
        run: |
          python3 scripts/performance/push_store_ingestion_perf_metrics.py /tmp/store-read-perf-metrics

      - name: Upload read metrics artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: store-read-perf-metrics-${{ github.run_id }}
          path: /tmp/store-read-perf-metrics

      - name: Check read thresholds
        id: perf_check
        if: ${{ success() && github.event_name == 'schedule' }}
        run: |
          python3 scripts/performance/check_perf_thresholds.py /tmp/store-read-perf-metrics

      # sanity check
      - name: Check logs for errors
        uses: ./splice-shared-gha/.github/actions/sbt/execute_sbt_command
        with:
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1"
          cmd: checkErrors

      - name: Upload logs
        if: ${{ !success() }}
        uses: ./splice-shared-gha/.github/actions/sbt/upload_logs
        with:
          name: "logs-read-performance-tests"

      - name: Report Failures on Slack & Github
        if: ${{ github.event_name == 'schedule' && (failure() || steps.perf_check.outputs.has_breaches == 'true') }}
        uses: ./splice-shared-gha/.github/actions/tests/failure_notifications
        with:
          job_subname: "Read Tests"
          workload_identity_provider: "${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.FAILURE_NOTIFICATIONS_INVOKER_SA }}"
          notifications_url: '${{ secrets.FAILURE_NOTIFICATIONS_INVOKER_URL }}'
          slack_channel: '${{ secrets.FAILURE_NOTIFICATIONS_SLACK_CHANNEL }}'

