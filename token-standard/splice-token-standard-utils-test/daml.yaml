sdk-version: 3.5.2
name: splice-token-standard-utils-test
description: |
  Tests of the token-standard-utils library.
version: 1.0.1
source: daml
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../../daml/dars/splice-api-token-metadata-v1-1.0.0.dar
  - ../../daml/dars/splice-api-token-holding-v1-1.0.0.dar
  - ../../daml/dars/splice-api-token-transfer-instruction-v1-1.0.0.dar
  - ../../daml/dars/splice-api-token-allocation-v1-1.0.0.dar
  - ../../daml/dars/splice-api-token-allocation-request-v1-1.0.0.dar
  - ../../daml/dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - ../splice-api-token-holding-v2/.daml/dist/splice-api-token-holding-v2-current.dar
  - ../splice-api-token-transfer-events-v2/.daml/dist/splice-api-token-transfer-events-v2-current.dar
  - ../splice-api-token-transfer-instruction-v2/.daml/dist/splice-api-token-transfer-instruction-v2-current.dar
  - ../splice-api-token-allocation-v2/.daml/dist/splice-api-token-allocation-v2-current.dar
  - ../splice-api-token-allocation-instruction-v2/.daml/dist/splice-api-token-allocation-instruction-v2-current.dar
  - ../splice-api-token-allocation-request-v2/.daml/dist/splice-api-token-allocation-request-v2-current.dar

  - ../splice-token-standard-utils/.daml/dist/splice-token-standard-utils-current.dar

  - ../examples/splice-token-test-dummy-holding/.daml/dist/splice-token-test-dummy-holding-current.dar
  - ../splice-token-standard-v1-test/.daml/dist/splice-token-standard-v1-test-current.dar
  - ../examples/splice-token-test-trading-app-v2/.daml/dist/splice-token-test-trading-app-v2-current.dar
build-options:
  - --target=2.1
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
codegen:
  java:
    package-prefix: org.lfdecentralizedtrust.splice.codegen.java
    decoderClass: org.lfdecentralizedtrust.splice.codegen.java.DecoderSpliceTokenStandardUtilsTest
    output-directory: target/daml-codegen-java
