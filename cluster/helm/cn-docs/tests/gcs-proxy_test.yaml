suite: "gcs-proxy values"
templates:
  - gcs-proxy.yaml
tests:
  - it: "sets default security contexts for pods and containers"
    set:
      networkName: "MockNet"
      enableGcsProxy: true
    asserts:
      - documentIndex: 0
        equal:
          path: spec.template.spec.securityContext
          value:
            seccompProfile:
              type: RuntimeDefault
      - documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL

  - it: "allows overriding security contexts completely via values"
    set:
      networkName: "MockNet"
      enableGcsProxy: true
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          gcsProxy:
            runAsUser: 5000
            allowPrivilegeEscalation: true
    asserts:
      - documentIndex: 0
        equal:
          path: spec.template.spec.securityContext
          value:
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 1001
            allowPrivilegeEscalation: true
            privileged: false
            capabilities:
              drop:
                - ALL
