suite: "Mediator values"
templates:
  - mediator.yaml
release:
  # Set for testing labels
  name: global-domain-6
chart:
  # Override for testing labels
  version: 0.1.1
  appVersion: 0.1.0
tests:
  - it: "sets labels as expected"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      # Sanity checks
      - equal:
          path: metadata.name
          value: global-domain-6-mediator
      - equal:
          path: spec.template.spec.containers[0].name
          value: mediator
      # Labels on deployment
      - isSubset:
          path: metadata.labels
          content:
            # Splice-specific
            app: global-domain-6-mediator
            splice-component: mediator
            # k8s/Helm standard
            app.kubernetes.io/component: mediator
            app.kubernetes.io/instance: global-domain-6
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: global-domain-6-mediator
            app.kubernetes.io/version: "0.1.0"
            helm.sh/chart: splice-global-domain-0.1.1
      # Labels on pod; should be the same as on deployment
      - isSubset:
          path: spec.template.metadata.labels
          content:
            # Splice-specific
            app: global-domain-6-mediator
            splice-component: mediator
            # k8s/Helm standard
            app.kubernetes.io/component: mediator
            app.kubernetes.io/instance: global-domain-6
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: global-domain-6-mediator
            app.kubernetes.io/version: "0.1.0"
            helm.sh/chart: splice-global-domain-0.1.1
  - it: "can enable pvc"
    set:
      pvc:
        size: 10Gi
        volumeStorageClass: standard-rwo
    documentSelector:
      path: kind
      value: PersistentVolumeClaim
    asserts:
      - equal:
          path: metadata.name
          value: global-domain-6-mediator-pvc
  - it: "can set additional env vars"
    set:
      mediator:
        additionalEnvVars:
        - name: ADDITIONAL_MEDIATOR_ENV_VAR_NAME
          value: ADDITIONAL_MEDIATOR_ENV_VAR_VALUE
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ADDITIONAL_MEDIATOR_ENV_VAR_NAME
            value: ADDITIONAL_MEDIATOR_ENV_VAR_VALUE
  - it: "uses resources when only resources is set"
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
  - it: "uses mediator.resources when only mediator.resources is set"
    set:
      mediator:
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  - it: "merges resources with mediator.resources taking precedence"
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      mediator:
        resources:
          requests:
            cpu: 500m
          limits:
            memory: 1Gi
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 1Gi

  - it: "allows overriding mediator imageName and initImage"
    set:
      imageRepo: "secure-registry.com"
      mediator.imageName: "approved-mediator"
      mediator.persistence.initImageName: "secure-registry.com/postgres:14-hardened"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='mediator')].image
          pattern: "^secure-registry.com/approved-mediator:"
      - equal:
          path: spec.template.spec.initContainers[?(@.name=='pg-init')].image
          value: "secure-registry.com/postgres:14-hardened"

  - it: "allows overriding mediator database secret env vars with raw strings"
    set:
      mediator.persistence.secretOverrides.postgresPassword: "vault:kv/data/mediator/postgres-password"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='mediator')].env[?(@.name=='CANTON_DOMAIN_POSTGRES_PASSWORD')].value
          pattern: "vault:kv/data/mediator/postgres-password"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=='pg-init')].env[?(@.name=='PGPASSWORD')].value
          pattern: "vault:kv/data/mediator/postgres-password"
      - notExists:
          path: spec.template.spec.containers[?(@.name=='mediator')].env[?(@.valueFrom.secretKeyRef)]

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-domain-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-domain-sa"

  - it: "applies mediator-specific JVM options"
    set:
      mediator.additionalJvmOptions: "-Dmediator.option=true"
      sequencer.additionalJvmOptions: "-Dsequencer.option=true"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='mediator')].env[?(@.name=='JAVA_TOOL_OPTIONS')].value
          pattern: '-Dmediator\.option=true'
      - notMatchRegex:
          path: spec.template.spec.containers[?(@.name=='mediator')].env[?(@.name=='JAVA_TOOL_OPTIONS')].value
          pattern: '-Dsequencer\.option=true'

  - it: "sets default security contexts for pods and containers"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
      - equal:
          path: spec.template.spec.initContainers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL

  - it: "allows overriding security contexts via values"
    set:
      securityContexts:
        pod:
          fsGroup: 1001
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          mediator:
            runAsUser: 5000
            allowPrivilegeEscalation: true
          persistence:
            runAsUser: 6000
            privileged: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 1001
            allowPrivilegeEscalation: true
            privileged: false
            capabilities:
              drop:
                - ALL
      - equal:
          path: spec.template.spec.initContainers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 6000
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: true
            capabilities:
              drop:
                - ALL
