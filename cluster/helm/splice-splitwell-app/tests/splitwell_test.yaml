suite: "Splitwell values"
templates:
  - splitwell.yaml
release:
  # Set for testing labels
  name: splitwell
chart:
  # Override for testing labels
  version: 0.1.1
  appVersion: 0.1.0
tests:
  - it: "sets the splitwell DAR version"
    set:
      # Things we need just to pass the schema
      persistence:
        host: mock-pg-host
        schema: splitwell
      auth:
        jwksUrl: "https://mock.com/.well-known/jwks.json"
        targetAudience: "mock_audience"
      maxDarVersion: 1.0.0
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      # Sanity check
      - equal:
          path: spec.template.spec.containers[0].name
          value: splitwell-app
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ADDITIONAL_CONFIG_MAX_DAR_VERSION
            value: canton.splitwell-apps.splitwell_backend.required-dar-version = "1.0.0"

  - it: "allows overriding splitwell image and initImage"
    set:
      imageRepo: "secure-registry.example.com"
      imageName: "custom-splitwell"
      persistence.initImageName: "secure-registry.example.com/postgres:14-custom"
      scanAddress: "dummy"
      participantHost: "dummy"
      persistence.host: "dummy"
      persistence.schema: "dummy"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].image
          pattern: "^secure-registry\\.example\\.com/custom-splitwell:"
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "secure-registry.example.com/postgres:14-custom"

  - it: "allows overriding splitwell database secret env vars with raw strings"
    set:
      persistence.secretOverrides.postgresPassword: "vault:kv/data/splitwell/postgres-password"
      scanAddress: "dummy"
      participantHost: "dummy"
      persistence.host: "dummy"
      persistence.schema: "dummy"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].env[?(@.name=='SPLICE_APP_POSTGRES_PASSWORD')].value
          pattern: "vault:kv/data/splitwell/postgres-password"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=='splitwell-init')].env[?(@.name=='PGPASSWORD')].value
          pattern: "vault:kv/data/splitwell/postgres-password"

  - it: "allows overriding splitwell database and auth0 secret env vars with raw strings and renders zero secretKeyRefs"
    set:
      scanAddress: "dummy"
      participantHost: "dummy"
      persistence:
        host: "dummy"
        schema: "dummy"
        secretOverrides:
          postgresPassword: "vault:kv/data/splitwell/postgres-password"
      auth:
        jwksUrl: "https://mock.com/.well-known/jwks.json"
        audience: "mock_audience"
        secretOverrides:
          ledgerApiUser: "vault:kv/data/splitwell/auth-user"
          audience: "vault:kv/data/splitwell/auth-aud"
          token: "vault:kv/data/splitwell/auth-token"
          url: "vault:kv/data/splitwell/auth-url"
          clientId: "vault:kv/data/splitwell/auth-client-id"
          clientSecret: "vault:kv/data/splitwell/auth-client-secret"
          scope: "vault:kv/data/splitwell/auth-scope"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].env[?(@.valueFrom.secretKeyRef)]
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].env[?(@.name=='SPLICE_APP_POSTGRES_PASSWORD')].value
          pattern: "vault:kv/data/splitwell/postgres-password"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=='splitwell-init')].env[?(@.name=='PGPASSWORD')].value
          pattern: "vault:kv/data/splitwell/postgres-password"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].env[?(@.name=='SPLICE_APP_SPLITWELL_LEDGER_API_AUTH_USER_NAME')].value
          pattern: "vault:kv/data/splitwell/auth-user"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=='splitwell-app')].env[?(@.name=='SPLICE_APP_SPLITWELL_LEDGER_API_AUTH_AUDIENCE')].value
          pattern: "vault:kv/data/splitwell/auth-aud"

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-splitwell-sa"
      scanAddress: "dummy"
      participantHost: "dummy"
      persistence.host: "dummy"
      persistence.schema: "dummy"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-splitwell-sa"

  - it: "pvc creates volume and mount for heap dumps at /persistent-data"
    set:
      persistence:
        host: mock-pg-host
        schema: splitwell
      auth:
        jwksUrl: "https://mock.com/.well-known/jwks.json"
        targetAudience: "mock_audience"
      maxDarVersion: 1.0.0
      pvc:
        size: "5Gi"
        volumeStorageClass: "standard"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: splitwell-volume
            mountPath: /persistent-data
      - contains:
          path: spec.template.spec.volumes
          content:
            name: splitwell-volume
            persistentVolumeClaim:
              claimName: splitwell-splitwell-pvc

  - it: "pvc creates a PersistentVolumeClaim resource"
    set:
      persistence:
        host: mock-pg-host
        schema: splitwell
      auth:
        jwksUrl: "https://mock.com/.well-known/jwks.json"
        targetAudience: "mock_audience"
      maxDarVersion: 1.0.0
      pvc:
        size: "5Gi"
        volumeStorageClass: "standard"
    documentSelector:
      path: metadata.name
      value: splitwell-splitwell-pvc
    asserts:
      - equal:
          path: kind
          value: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: "5Gi"
      - equal:
          path: spec.storageClassName
          value: "standard"
      - equal:
          path: metadata.annotations
          value:
            helm.sh/resource-policy: keep

  - it: "pvc is not created by default"
    set:
      persistence:
        host: mock-pg-host
        schema: splitwell
      auth:
        jwksUrl: "https://mock.com/.well-known/jwks.json"
        targetAudience: "mock_audience"
      maxDarVersion: 1.0.0
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: splitwell-volume
            mountPath: /persistent-data

  - it: "omits security contexts by default"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.securityContext
      - notExists:
          path: spec.template.spec.containers[0].securityContext
      - notExists:
          path: spec.template.spec.initContainers[0].securityContext

  - it: "allows overriding security contexts via values"
    set:
      scanAddress: "dummy"
      participantHost: "dummy"
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          splitwell:
            runAsUser: 5000
            allowPrivilegeEscalation: true
          persistence:
            runAsUser: 6000
            privileged: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 5000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 6000
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.privileged
          value: true
