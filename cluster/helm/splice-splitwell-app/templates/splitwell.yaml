apiVersion: apps/v1
kind: Deployment
metadata:
  name: splitwell-app
  namespace: {{ .Release.Namespace }}
  {{- $annotations := include "splice-util-lib.default-annotations" .Values }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "splice-util-lib.default-labels" (set . "app" "splitwell-app") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splitwell-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "splice-util-lib.default-labels" (set . "app" "splitwell-app") | nindent 8 }}
    spec:
      {{- include "splice-util-lib.service-account" .Values | nindent 6 }}
      {{- if .Values.securityContexts }}
      {{- with .Values.securityContexts.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: splitwell-app
        {{- if .Values.securityContexts }}
        {{- with .Values.securityContexts.containers.splitwell }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        image: {{ .Values.imageRepo }}/{{ .Values.imageName}}:{{ .Chart.AppVersion }}{{ ((.Values.imageDigests).splitwell_app) }}
        {{- with .Values.imagePullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "{{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }} -Dlogback.configurationFile=/app/logback/logback.xml"
        - name: SPLICE_APP_SPLITWELL_SCAN_URL
          value: {{ .Values.scanAddress }}
        - name: SPLICE_APP_SPLITWELL_PARTICIPANT_HOST
          value: {{ .Values.participantHost }}
        {{- include "splice-util-lib.auth0-env-vars" (dict "appName" "splitwell" "keyName" "splitwell" "fixedTokens" (.Values.cluster).fixedTokens "secretOverrides" (.Values.auth).secretOverrides) | indent 8}}
        {{- with .Values.persistence }}
        - name: ADDITIONAL_CONFIG_PERSISTENCE
          value: |
            canton.splitwell-apps.splitwell_backend.storage {
              config {
                properties = {
                  databaseName = "{{ .databaseName }}"
                  currentSchema = "{{ .schema }}"
                  serverName = "{{ .host }}"
                  portNumber = {{ .port }}
                  user = "{{ .user }}"
                  password = ${SPLICE_APP_POSTGRES_PASSWORD}
                }
              }
            }
        - name: SPLICE_APP_POSTGRES_PASSWORD
          {{- if (($.Values.persistence).secretOverrides).postgresPassword }}
          value: {{ $.Values.persistence.secretOverrides.postgresPassword | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.persistence.secretName }}
              key: postgresPassword
          {{- end }}
        {{- end }}
        - name: FAIL_ON_APP_VERSION_MISMATCH
          value: {{ .Values.failOnAppVersionMismatch | quote }}
        {{- with .Values.maxDarVersion }}
        - name: ADDITIONAL_CONFIG_MAX_DAR_VERSION
          value: canton.splitwell-apps.splitwell_backend.required-dar-version = {{ . | quote }}
        {{- end }}
        {{- include "splice-util-lib.additional-env-vars" .Values.additionalEnvVars | indent 8}}
        {{- include "splice-util-lib.log-level" .Values | indent 8}}
        ports:
        - containerPort: 5213
          name: sw-api
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: logback-config
            # Must mount the whole configmap as a directory instead of shadowing /app/logback.xml with subPath as the latter
            # would not receive configmap updates.
            # see https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/#mounted-configmaps-are-updated-automatically
            mountPath: /app/logback
        {{- if .Values.pvc }}
          - name: splitwell-volume
            mountPath: /persistent-data
        {{- end }}
      initContainers:
        - name: {{ .Release.Name }}-init
          {{- if .Values.securityContexts }}
          {{- with .Values.securityContexts.containers.persistence }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          image: {{ .Values.persistence.initImageName}}
          env:
            - name: PGPASSWORD
              {{- if ((.Values.persistence).secretOverrides).postgresPassword }}
              value: {{ .Values.persistence.secretOverrides.postgresPassword | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.persistence.secretName }}
              {{- end }}
          command:
            - 'bash'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.persistence.host }} -p {{ .Values.persistence.port }} --username=cnadmin --dbname=cantonnet -c 'create database {{ .Values.persistence.databaseName }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.persistence.databaseName }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.persistence.databaseName }}, last error: $errmsg";
                sleep 2;
              done
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: logback-config
          configMap:
            name: {{ .Release.Name }}-splitwell-app-logback-config
        {{- if .Values.pvc }}
        - name: splitwell-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-splitwell-pvc
        {{- end }}
{{- if .Values.pvc }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-splitwell-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "splice-util-lib.default-labels" (set . "app" $.Release.Name) | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.pvc.size }}
  storageClassName: {{ .Values.pvc.volumeStorageClass }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: splitwell-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "splice-util-lib.default-labels" (set . "app" "splitwell-app") | nindent 4 }}
spec:
  selector:
    app: splitwell-app
  ports:
  - name: sw-api
    port: 5213
    protocol: TCP
  - name: metrics
    port: 10013
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-splitwell-app-logback-config
  namespace: {{ .Release.Namespace }}
data:
  logback.xml: |
{{ .Files.Get "files/logback.xml" | indent 4 }}
