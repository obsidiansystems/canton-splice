suite: "Splice-info values"
templates:
  - deployment.yaml
  - configmap-config.yaml

release:
  # Set for testing labels
  name: mock
  namespace: mons
chart:
  # Override for testing labels
  version: 0.1.1
  appVersion: 0.1.0
imagePullPolicy: IfNotPresent
nginxImage: "some-nginx-image"

tests:
  - it: "should include runtime details env vars"
    template: deployment.yaml
    set:
      runtimeDetails:
        synchronizerSerialId: 101
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      # Sanity check
      - equal:
          path: spec.template.spec.containers[0].name
          value: "nginx"
      - equal:
          path: spec.template.spec.containers[?(@.name=='updater')].env[?(@.name=='SCAN_URL')].value
          value: "http://scan-app:5012"
      - equal:
          path: spec.template.spec.containers[?(@.name=='updater')].env[?(@.name=='SERIAL_ID')].value
          value: "101"

  - it: "injects custom serviceAccountName into Deployment when specified"
    template: deployment.yaml
    set:
      serviceAccountName: "custom-splice-info-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-splice-info-sa"

  - it: "sets default security contexts for pods and containers"
    template: deployment.yaml
    set:
      runtimeDetails:
        synchronizerSerialId: 101
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
      - equal:
          path: spec.template.spec.containers[1].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL

  - it: "allows overriding security contexts via values"
    template: deployment.yaml
    set:
      runtimeDetails:
        synchronizerSerialId: 101
      securityContexts:
        pod:
          fsGroup: 1001
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          nginx:
            runAsUser: 5000
            allowPrivilegeEscalation: true
          updater:
            runAsUser: 6000
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 1001
            allowPrivilegeEscalation: true
            privileged: false
            capabilities:
              drop:
                - ALL
      - equal:
          path: spec.template.spec.containers[1].securityContext
          value:
            runAsNonRoot: true
            runAsUser: 6000
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
