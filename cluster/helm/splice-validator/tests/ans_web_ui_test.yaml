suite: "ANS Web UI"
templates:
  - ans-web-ui.yaml

set:
  nodeIdentifier: "helm-mock-1-validator"
  validatorPartyHint: "helm-mock-1"
  validatorWalletUser: "mock-wallet-user-id"
  spliceInstanceNames:
    networkName: MockNet
    networkFaviconUrl: https://mock.net/favicon.ico
    amuletName: Mocklet
    amuletNameAcronym: MCK
    nameServiceName: Mock Name Service
    nameServiceNameAcronym: MNS
  topup:
    enabled: false
  auth:
    jwksUrl: "https://mock.com/.well-known/jwks.json"
    audience: "mock_audience"

tests:
  - it: "allows overriding ans-web-ui secret env vars with raw strings"
    set:
      ansWebUi.secretOverrides.clientId: "vault:kv/data/cns-ui/client-id"
      ansWebUi.secretOverrides.url: "vault:kv/data/cns-ui/url"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="ans-web-ui")].env[?(@.name=="SPLICE_APP_UI_AUTH_CLIENT_ID")].value
          pattern: "vault:kv/data/cns-ui/client-id"
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="ans-web-ui")].env[?(@.name=="SPLICE_APP_UI_AUTH_URL")].value
          pattern: "vault:kv/data/cns-ui/url"

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-ans-ui-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-ans-ui-sa"

  - it: "sets default security contexts"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[?(@.name=='ans-web-ui')].securityContext
          value:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL

  - it: "allows overriding security contexts via values"
    set:
      securityContexts:
        pod:
          runAsNonRoot: true
        containers:
          ansWebUi:
            runAsUser: 5000
            allowPrivilegeEscalation: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[?(@.name=='ans-web-ui')].securityContext.runAsUser
          value: 5000
      - equal:
          path: spec.template.spec.containers[?(@.name=='ans-web-ui')].securityContext.allowPrivilegeEscalation
          value: true
