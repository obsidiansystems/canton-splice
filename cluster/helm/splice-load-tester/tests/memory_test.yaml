suite: test memory resources
templates:
  - load-tester.yaml
tests:
  - it: should have correct memory limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 8Gi

  - it: "allows overriding load tester image name"
    set:
      imageRepo: "secure-registry.example.com"
      imageName: "custom-load-tester"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^secure-registry\\.example\\.com/custom-load-tester:"

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-load-tester-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-load-tester-sa"

  - it: "omits security contexts when left undefined by default"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.securityContext
      - notExists:
          path: spec.template.spec.containers[0].securityContext

  - it: "allows setting security contexts via values"
    set:
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          loadTester:
            runAsUser: 5000
            allowPrivilegeEscalation: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 5000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
