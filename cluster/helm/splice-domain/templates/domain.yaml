apiVersion: apps/v1
kind: Deployment
metadata:
  {{- $annotations := include "splice-util-lib.default-annotations" .Values }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "splice-util-lib.default-labels" (set . "app" .Release.Name) | nindent 4 }}
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        {{- toYaml .Values.pod.annotations | nindent 8 }}
      labels:
        {{- include "splice-util-lib.default-labels" (set . "app" .Release.Name) | nindent 8 }}
    spec:
      {{- include "splice-util-lib.service-account" .Values | nindent 6 }}
      {{- if .Values.securityContexts }}
      {{- with .Values.securityContexts.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: {{ .Release.Name }}
        {{- if .Values.securityContexts }}
        {{- with .Values.securityContexts.containers.domain }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        image: {{ .Values.imageRepo }}/{{ .Values.imageName}}:{{ .Chart.AppVersion }}{{ ((.Values.imageDigests).canton_domain) }}
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }}
        - name: CANTON_DOMAIN_POSTGRES_SERVER
          value: {{ .Values.sequencer.persistence.host }}
        - name: CANTON_DOMAIN_POSTGRES_PASSWORD
          {{- if ((.Values.sequencer.persistence).secretOverrides).postgresPassword }}
          value: {{ .Values.sequencer.persistence.secretOverrides.postgresPassword | quote }}
          {{- else }}
          valueFrom:
           secretKeyRef:
              name: {{ .Values.sequencer.persistence.secretName }}
              key: postgresPassword
          {{- end }}
        {{- if .Values.sequencer.persistence.databaseName }}
        - name: CANTON_SEQUENCER_POSTGRES_DB
          value: {{ .Values.sequencer.persistence.databaseName }}
        {{- end }}
        {{- if .Values.mediator.persistence.databaseName }}
        - name: CANTON_MEDIATOR_POSTGRES_DB
          value: {{ .Values.mediator.persistence.databaseName }}
        {{- end }}
        {{- with .Values.imagePullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        ports:
        - containerPort: 5008
          name: cd-pub-api
          protocol: TCP
        - containerPort: 5009
          name: cd-adm-api
          protocol: TCP
        - containerPort: 10013
          name: cd-metrics
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        livenessProbe:
          failureThreshold: 5
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        startupProbe:
          failureThreshold: 20
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        {{- if .Values.pvc }}
        volumeMounts:
          - name: domain-volume
            mountPath: /persistent-data
        {{- end }}
      restartPolicy: Always
      initContainers:
        - name: {{ .Release.Name }}-init-sequencer
          {{- if .Values.securityContexts }}
          {{- with .Values.securityContexts.containers.persistence }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          image: {{ .Values.initImageName}}
          env:
            - name: PGPASSWORD
              {{- if ((.Values.sequencer.persistence).secretOverrides).postgresPassword }}
              value: {{ .Values.sequencer.persistence.secretOverrides.postgresPassword | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.sequencer.persistence.secretName }}
              {{- end }}
          command:
            - 'bash'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.sequencer.persistence.host }} -p {{ .Values.sequencer.persistence.port }} --username=cnadmin --dbname=cantonnet -c 'create database {{ .Values.sequencer.persistence.databaseName }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.sequencer.persistence.databaseName }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.sequencer.persistence.databaseName }}, last error: $errmsg";
                sleep 2;
              done
        - name: {{ .Release.Name }}-init-mediator
          {{- if .Values.securityContexts }}
          {{- with .Values.securityContexts.containers.persistence }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          image: {{ .Values.initImageName}}
          env:
            - name: PGPASSWORD
              {{- if ((.Values.mediator.persistence).secretOverrides).postgresPassword }}
              value: {{ .Values.mediator.persistence.secretOverrides.postgresPassword | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.mediator.persistence.secretName }}
              {{- end }}
          command:
            - 'bash'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.mediator.persistence.host }} -p {{ .Values.mediator.persistence.port }} --username=cnadmin --dbname=cantonnet -c 'create database {{ .Values.mediator.persistence.databaseName }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.mediator.persistence.databaseName }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.mediator.persistence.databaseName }}, last error: $errmsg";
                sleep 2;
              done
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.pvc }}
      volumes:
        - name: domain-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-domain-pvc
      {{- end }}
{{- if .Values.pvc }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-domain-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "splice-util-lib.default-labels" (set . "app" $.Release.Name) | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.pvc.size }}
  storageClassName: {{ .Values.pvc.volumeStorageClass }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
  - name: cd-pub-api
    port: 5008
    protocol: TCP
  - name: cd-adm-api
    port: 5009
    protocol: TCP
  - name: cm-adm-api
    port: 5007
    protocol: TCP
  - name: cd-metrics
    port: 10013
    protocol: TCP
