suite: "Domain values"
templates:
  - domain.yaml
release:
  name: mock-domain

set:
  sequencer:
    persistence:
      host: "postgres"
      secretName: "postgres-secrets"
  mediator:
    persistence:
      host: "postgres"
      secretName: "postgres-secrets"
  initImageName: "postgres:14"

tests:
  - it: "allows overriding sequencer and mediator postgres passwords with raw strings"
    set:
      sequencer.persistence.secretOverrides.postgresPassword: "vault:kv/data/synchronizer/sequencer-db-pass"
      mediator.persistence.secretOverrides.postgresPassword: "vault:kv/data/synchronizer/mediator-db-pass"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="mock-domain")].env[?(@.name=="CANTON_DOMAIN_POSTGRES_PASSWORD")].value
          pattern: "vault:kv/data/synchronizer/sequencer-db-pass"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=="mock-domain-init-sequencer")].env[?(@.name=="PGPASSWORD")].value
          pattern: "vault:kv/data/synchronizer/sequencer-db-pass"
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=="mock-domain-init-mediator")].env[?(@.name=="PGPASSWORD")].value
          pattern: "vault:kv/data/synchronizer/mediator-db-pass"

  - it: "injects custom serviceAccountName into Deployment when specified"
    set:
      serviceAccountName: "custom-domain-sa"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "custom-domain-sa"

  - it: "pvc creates volume and mount for heap dumps at /persistent-data"
    set:
      pvc:
        size: "5Gi"
        volumeStorageClass: "standard"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: domain-volume
            mountPath: /persistent-data
      - contains:
          path: spec.template.spec.volumes
          content:
            name: domain-volume
            persistentVolumeClaim:
              claimName: mock-domain-domain-pvc

  - it: "pvc creates a PersistentVolumeClaim resource"
    set:
      pvc:
        size: "5Gi"
        volumeStorageClass: "standard"
    documentSelector:
      path: metadata.name
      value: mock-domain-domain-pvc
    asserts:
      - equal:
          path: kind
          value: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: "5Gi"
      - equal:
          path: spec.storageClassName
          value: "standard"
      - equal:
          path: metadata.annotations
          value:
            helm.sh/resource-policy: keep

  - it: "pvc is not created by default"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.volumes


  - it: "omits security contexts by default"
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - notExists:
          path: spec.template.spec.securityContext
      - notExists:
          path: spec.template.spec.containers[0].securityContext
      - notExists:
          path: spec.template.spec.initContainers[0].securityContext
      - notExists:
          path: spec.template.spec.initContainers[1].securityContext

  - it: "allows overriding security contexts via values"
    set:
      securityContexts:
        pod:
          runAsNonRoot: true
          seccompProfile:
            type: Localhost
            localhostProfile: profiles/hardened.json
        containers:
          domain:
            runAsUser: 5000
            allowPrivilegeEscalation: true
          persistence:
            runAsUser: 6000
            privileged: true
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            runAsNonRoot: true
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/hardened.json
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 5000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 6000
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.privileged
          value: true
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.runAsUser
          value: 6000
      - equal:
          path: spec.template.spec.initContainers[1].securityContext.privileged
          value: true
